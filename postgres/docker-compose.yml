services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    # Port is intentionally NOT published to the host.
    # Other containers on the 'proxy' network reach postgres by hostname "postgres".
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: postgres_data

networks:
  proxy:
    name: traefik-main
    external: true  # Created by the traefik compose — start traefik first
