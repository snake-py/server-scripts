services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Grant Traefik read-only access to what it needs — nothing else
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
    networks:
      - socket-proxy

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - GODADDY_API_KEY=${GODADDY_API_KEY}
      - GODADDY_API_SECRET=${GODADDY_API_SECRET}
      # netcup alternative — uncomment if using netcup instead of GoDaddy:
      # - NETCUP_RELAY_HOST=${NETCUP_CUSTOMER_NUMBER}
      # - NETCUP_API_KEY=${NETCUP_API_KEY}
      # - NETCUP_API_PASSWORD=${NETCUP_API_PASSWORD}
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./acme.json:/acme.json
    networks:
      - proxy
      - socket-proxy
    labels:
      - "traefik.enable=true"
      # Dashboard router
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      # Basic auth middleware — generate value with:
      # docker run --rm httpd:alpine htpasswd -nbB fabio yourpassword | sed -e 's/\$/\$\$/g'
      - "traefik.http.routers.traefik.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

networks:
  proxy:
    name: traefik-main
    driver: bridge
  socket-proxy:
    name: socket-proxy
    driver: bridge
    internal: true  # no internet access for the socket proxy network
